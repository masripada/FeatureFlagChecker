name: masripadafeatureflag

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Deploy to Azure Function App
        uses: azure/functions-action@v1
        with:
          app-name: 'masripadafeatureflag'
          publish-profile: ${{ secrets.masripadafeatureflag_PUBLISH_PROFILE }}
          
