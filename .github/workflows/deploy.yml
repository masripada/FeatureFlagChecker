name: Build and Deploy React App to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Add server files to build
        run: |
          cp server.js build/server.js
          cp server-package.json build/package.json
          cp web.config build/web.config

      - name: Install server dependencies
        run: cd build && npm install --omit=dev

      - name: Zip the build
        run: cd build && zip -r ../app.zip .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'masripadafeatureflag'
          publish-profile: ${{ secrets.masripadafeatureflag_PUBLISH_PROFILE }}
          package: app.zip
